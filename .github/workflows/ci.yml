name: delegate-skill CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  smoke:
    name: setup.sh smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run hermetic setup smoke test
        run: bash tests/smoke.sh

  aggregator-tests:
    name: telemetry aggregator tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run aggregator tests
        run: python -m pytest delegate-extras/shared/tests -q
